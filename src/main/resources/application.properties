# =============================================
# APPLICATION
# =============================================
spring.application.name=pharmacy-backend
server.port=8080

# =============================================
# DATABASE - PostgreSQL
# =============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/zcare_db
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Connection Pooling
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# =============================================
# JWT CONFIGURATION
# Change secret to a long random string in production!
# =============================================
jwt.secret=zcare_secure_prod_key_2026_03_26_a9b8c7d6e5f4g3h2i1j0k9l8m7n6o5p4
jwt.expiration=86400000

# =============================================
# SWAGGER / OPENAPI
# Access at: http://localhost:8080/swagger-ui.html
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# =============================================
cors.allowed-origins[0]=http://localhost:3000
cors.allowed-origins[1]=http://localhost:5173

# =============================================
# LOGGING
# =============================================
logging.level.com.pharmacy=DEBUG
logging.level.org.springframework.security=INFO
