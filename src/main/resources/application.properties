# =============================================
# APPLICATION
# =============================================
spring.application.name=pharmacy-backend
server.port=8080

# =============================================
# DATABASE - PostgreSQL (Supabase free tier)
# Replace with your Supabase connection details
# =============================================
spring.datasource.url=jdbc:postgresql://YOUR_SUPABASE_HOST:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=YOUR_SUPABASE_PASSWORD
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# JPA / HIBERNATE
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================================
# JWT CONFIGURATION
# Change secret to a long random string in production!
# =============================================
jwt.secret=pharmacy_super_secret_key_change_this_in_production_use_256bit
jwt.expiration=86400000

# =============================================
# SWAGGER / OPENAPI
# Access at: http://localhost:8080/swagger-ui.html
# =============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# =============================================
# CORS - Allow frontend and Flutter to connect
# =============================================
cors.allowed-origins=http://localhost:3000,http://localhost:5173,https://your-vercel-app.vercel.app

# =============================================
# LOGGING
# =============================================
logging.level.com.pharmacy=DEBUG
logging.level.org.springframework.security=INFO
